# ── Application ──
app:
  project_name: "EXACT 2026"
  version: "2.0.0"
  debug: true

# ── LLM ──
llm:
  model_id: "platypus123/Qwen-Z3-Merged-BTAM17026"
  temperature: 0.0
  max_new_tokens: 1024
  load_in_4bit: true

# ── RAG ──
rag:
  reranker: "BAAI/bge-reranker-base"

# ── Embedding ──
embedding:
  model_name: "BAAI/bge-m3"

# ── Retrieval ──
retrieval:
  threshold: 0.95
  top_k: 10             # Giam tu 20 xuong 10 (nhanh hon, van du)
  rerank_top_n: 3

# ── Storage ──
storage:
  data_dir: "data"
  vector_db: "storage/vector_db"
  collection_name: "exact"

# ── Pipeline ──
pipeline:
  global_timeout: 300          # Nới lỏng lên 300s (5 phút) để chạy hết cỡ không bao giờ ngắt
  solver_timeout: 15
  max_retry: 1               # Giam tu 2 xuong 1 (tiet kiem ~30 giay)
  llm_generate_timeout: 15

# ── LangSmith ──
langsmith:
  project: "EXACT 2026"
  endpoint: "https://api.smith.langchain.com"
